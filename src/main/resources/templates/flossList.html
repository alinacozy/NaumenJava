<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Floss List</title>
    <style>
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
        }
    </style>
</head>
<body>
<h1>Floss List</h1>
<table>
    <tr>
        <th>ID</th>
        <th>Brand</th>
        <th>Number</th>
        <th>Color Name</th>
        <th>Color Group</th>
        <th>Color</th>
    </tr>
    <tr th:each="floss : ${flosses}">
        <td th:text="${floss.id}"></td>
        <td th:text="${floss.brand}"></td>
        <td th:text="${floss.colorNumber}"></td>
        <td th:text="${floss.colorName}"></td>
        <td th:text="${floss.colorGroup}"></td>
        <td style="background-color: #000000; color: white; text-align: center; font-weight: bold;"
            th:style="'background-color: ' + ${floss.hexCode} + '; color: ' + (${floss.red} + ${floss.green} + ${floss.blue} < 382 ? 'white' : 'black') + '; text-align: center; font-weight: bold;'"
            th:text="${floss.hexCode}">
        </td>
    </tr>
</table>
</body>
</html>
