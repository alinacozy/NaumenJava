<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Floss List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h1 class="mb-4">Floss List</h1>

<table class="table table-bordered table-hover">
    <thead class="table-light">
    <tr>
        <th>ID</th>
        <th>Brand</th>
        <th>Number</th>
        <th>Color Name</th>
        <th>Color Group</th>
        <th>Color</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="floss : ${flosses}">
        <td th:text="${floss.id}"></td>
        <td th:text="${floss.brand}"></td>
        <td th:text="${floss.colorNumber}"></td>
        <td th:text="${floss.colorName}"></td>
        <td th:text="${floss.colorGroup}"></td>
        <td style="background-color: #000000; color: white; text-align: center; font-weight: bold;"
            th:style="'background-color: ' + ${floss.hexCode} + '; color: ' + (${floss.red} + ${floss.green} + ${floss.blue} < 382 ? 'white' : 'black') + '; text-align: center; font-weight: bold;'"
            th:text="${floss.hexCode}">
        </td>
    </tr>
    </tbody>
</table>

<form th:action="@{/logout}" method="post" class="mt-3">
    <button type="submit" class="btn btn-danger">Выйти</button>
</form>
</body>
</html>
